<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UN_is_better.inc</title>
  <style>
    :root {
      --navy: #071f3f;
      --teal: #0b6f78;
      --orange: #e86b00;
      --bg: #f7f9fb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top, rgba(11,111,120,0.18), transparent 35%),
        linear-gradient(135deg, #ffffff, var(--bg));
      color: var(--navy);
    }

    .card {
      width: min(720px, 92vw);
      padding: 48px;
      border: 1px solid rgba(7,31,63,0.18);
      border-radius: 28px;
      background: rgba(255,255,255,0.86);
      box-shadow: 0 24px 70px rgba(7,31,63,0.18);
      text-align: center;
    }

    .logo {
      width: 92px;
      height: 92px;
      margin: 0 auto 24px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--teal), var(--navy));
      color: white;
      font-weight: 800;
      font-size: 32px;
      letter-spacing: -1px;
      position: relative;
    }

    .logo::after {
      content: "";
      position: absolute;
      width: 120px;
      height: 38px;
      border: 4px solid var(--orange);
      border-left-color: transparent;
      border-right-color: transparent;
      border-radius: 50%;
      transform: rotate(-24deg);
      opacity: 0.9;
    }

    h1 {
      margin: 0;
      font-size: clamp(36px, 7vw, 72px);
      letter-spacing: -0.05em;
      line-height: 0.95;
    }

    h1 span {
      color: var(--orange);
    }

    .tagline {
      margin: 22px auto 0;
      max-width: 520px;
      font-size: 18px;
      line-height: 1.5;
      color: #536070;
    }

    .status {
      margin-top: 34px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 18px;
      border-radius: 999px;
      background: rgba(232,107,0,0.09);
      color: #9a3e00;
      font-weight: 700;
      border: 1px solid rgba(232,107,0,0.25);
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--orange);
      box-shadow: 0 0 0 6px rgba(232,107,0,0.16);
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="logo">UN</div>
    <h1>UN_is_better<span>.inc</span></h1>
    <p class="tagline">
      Advanced nuclear fuel engineering, apparently discontinued before technical due diligence.
    </p>
    <div class="status">
      <span class="status-dot"></span>
      Operational status: theoretically unavailable
    </div>
  </main>

  <script>
    window.addEventListener("load", () => {
      setTimeout(() => {
        alert("The company failed already, you may forget what you have just heard");
      }, 350);
    });
  </script>
</body>
</html>
